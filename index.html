<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FoodRush</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f8;
            font-family: Arial;
        }

        /* NAVBAR */

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #1f3c88;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .title {
            text-align: center;
            margin-top: 40px;
        }

        /* CARD HOVER */

        .card {
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        /* LOGIN MODAL */

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            text-align: center;
        }

        .modal-content input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        .modal-content button {
            width: 95%;
            padding: 10px;
            background: #1f3c88;
            color: white;
            border: none;
        }

        .switch {
            color: #1f3c88;
            cursor: pointer;
        }
    </style>

</head>

<body>

    <header>

        <div class="logo">FoodRush</div>


        <div class="cart-btn">


            <button id="authBtn" class="btn btn-light" onclick="openModal()">Login</button>

    </header>
    <section class="py-5 bg-light border-bottom">

        <div class="container text-center">

            <h1 class="fw-bold">Select Your City</h1>

            <p class="text-muted">Order food from the best restaurants in your city</p>

        </div>

    </section>

    <div class="container mt-4">

        <div class="row g-4" id="cityGrid"></div>

    </div>


    <!-- LOGIN MODAL -->

    <div class="modal" id="authModal">

        <div class="modal-content">

            <h2 id="formTitle">Login</h2>

            <input id="name" placeholder="Name" style="display:none">

            <input id="email" placeholder="Email">

            <input id="password" type="password" placeholder="Password">

            <button onclick="submitAuth()">Login</button>

            <p class="switch" onclick="toggleForm()">
                Don't have account? Signup
            </p>

        </div>

    </div>

        ]


        const grid = document.getElementById("cityGrid")

        cities.forEach(city => {

            grid.innerHTML += `

<div class="col-md-3">

<div class="card shadow-sm h-100 text-center" onclick="openCity('${city.name}')">

<img src="${city.img}" class="card-img-top" style="height:160px;object-fit:cover">

<div class="card-body">

<h5 class="card-title">${city.name}</h5>

</div>

</div>

</div>

`

        })


        function openCity(city) {

            localStorage.setItem("selectedCity", city)

            window.location.href = "restaurants.html"

        }


        /* LOGIN SYSTEM */

        let isSignup = false

        function openModal() {
            document.getElementById("authModal").style.display = "flex"
        }

        function closeModal() {
            document.getElementById("authModal").style.display = "none"
        }

        function toggleForm() {

            isSignup = !isSignup

            document.getElementById("name").style.display = isSignup ? "block" : "none"

            document.getElementById("formTitle").innerText = isSignup ? "Signup" : "Login"

            document.querySelector(".modal-content button").innerText = isSignup ? "Signup" : "Login"

            document.querySelector(".switch").innerText = isSignup ?
                "Already have account? Login" :
                "Don't have account? Signup"

        }


        function submitAuth() {

            const name = document.getElementById("name").value.trim()
            const email = document.getElementById("email").value.trim()
            const password = document.getElementById("password").value.trim()

            if (!email || !password) {
                alert("Please fill all fields")
                return
            }

            if (isSignup) {

                if (!name) {
                    alert("Enter your name")
                    return
                }

                let users = JSON.parse(localStorage.getItem("users")) || []

                let exist = users.find(u => u.email === email)

                if (exist) {
                    alert("User already exists")
                    return
                }

                users.push({ name, email, password })

                localStorage.setItem("users", JSON.stringify(users))

                alert("Signup successful")

                toggleForm()

            }

            else {

                let users = JSON.parse(localStorage.getItem("users")) || []

                let user = users.find(u => u.email === email && u.password === password)

                if (user) {

                    localStorage.setItem("loggedIn", "true")

                    localStorage.setItem("currentUser", user.name)

                    closeModal()

                    updateAuthButton()

                }

                else {
                    alert("Invalid login")
                }

            }

        }


        function updateAuthButton() {

            const btn = document.getElementById("authBtn")

            if (localStorage.getItem("loggedIn")) {

                const username = localStorage.getItem("currentUser")

                btn.innerText = "Logout (" + username + ")"

                btn.onclick = logout

            }

            else {

                btn.innerText = "Login"

                btn.onclick = openModal

            }

        }


        function logout() {

            localStorage.removeItem("loggedIn")

            localStorage.removeItem("currentUser")

            updateAuthButton()

        }


        updateAuthButton()

    </script>
