<!DOCTYPE html>
<html>

<head>

    <title>Checkout</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f8;
            font-family: Arial;
        }

        .checkout-box {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .qr-box {
            text-align: center;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .qr-box img {
            width: 200px;
        }
    </style>

</head>

<body>

    <nav class="navbar px-4" style="background:#2f4a8a;">
        <a class="navbar-brand text-white fw-bold fs-3" href="index.html">
            FoodRush
        </a>
    </nav>

    <div class="container mt-5">

        <div class="row">

            <!-- DELIVERY DETAILS -->

            <div class="col-md-6">

                <div class="checkout-box">

                    <h4 class="mb-3">Delivery Details</h4>

                    <input class="form-control mb-3" id="name" placeholder="Full Name">

                    <input class="form-control mb-3" id="address" placeholder="Address">

                    <input class="form-control mb-3" id="phone" placeholder="Phone Number">

                </div>

            </div>

            <!-- PAYMENT -->

            <div class="col-md-6">

                <div class="qr-box">

                    <h4>Pay Using UPI</h4>

                    <p>Scan QR and pay</p>

                    <img
                        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9115259@pz&pn=FoodRush&cu=INR">

                    <p class="mt-3"><b>Merchant Banking Name:</b> Ayush Porwal</p>

                    <hr>

                    <h6>Enter UPI Transaction ID</h6>

                    <input class="form-control mb-3" id="txn" placeholder="Enter Payment Transaction ID">

                    <button class="btn btn-success w-100" onclick="verifyPayment()">
                        Verify Payment & Place Order
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script>

        function verifyPayment() {

            let name = document.getElementById("name").value
            let address = document.getElementById("address").value
            let phone = document.getElementById("phone").value
            let txn = document.getElementById("txn").value

            if (!name || !address || !phone) {

                alert("Please fill delivery details")
                return

            }

            if (!txn) {

                alert("Please enter transaction ID after payment")
                return

            }

            /* simulate payment verification */

            alert("Payment Verified Successfully")

            localStorage.removeItem("cart")

            window.location.href = "success.html"

        }

    </script>

</body>

</html>
