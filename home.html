<!DOCTYPE html>
<html>

<head>

    <title>FoodRush - Home</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* HERO BACKGROUND */

        .hero {
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover no-repeat;
            position: relative;
            color: white;
        }

        /* DARK OVERLAY */

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        /* NAVBAR */

        .navbar {
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: white;
        }

        /* LOGIN BUTTON */

        .auth-btn button {
            background: white;
            color: black;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 500;
        }

        .auth-btn button:hover {
            background: #eee;
        }

        /* CENTER CONTENT */

        .hero-content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .btn-main {
            background: #fc8019;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 8px;
        }

        .btn-main:hover {
            background: #e76f00;
        }
    </style>

</head>

<body>

    <div class="hero">

        <div class="overlay"></div>

        <!-- NAVBAR -->

        <nav class="navbar px-4 d-flex justify-content-between">

            <div class="logo">FoodRush</div>

            <div class="auth-btn">
                <button id="authBtn" onclick="openModal()">Login</button>
            </div>

        </nav>

        <!-- HERO CONTENT -->

        <div class="hero-content">

            <h1 class="fw-bold mb-3">Delicious Food, Delivered Fast 🍔</h1>

            <p class="mb-4">Order from your favorite restaurants near you</p>

            <button class="btn btn-main" onclick="goToIndex()">
                Select Your Address According to Your City
            </button>

        </div>

    </div>


    <!-- LOGIN MODAL -->

    <div class="modal fade" id="authModal" tabindex="-1">

        <div class="modal-dialog">

            <div class="modal-content p-3">

                <h4 id="formTitle">Login</h4>

                <input id="name" class="form-control my-2" placeholder="Name" style="display:none">

                <input id="email" class="form-control my-2" placeholder="Email">

                <input id="password" type="password" class="form-control my-2" placeholder="Password">

                <button class="btn btn-primary mt-2" onclick="submitAuth()">Login</button>

                <p class="mt-2 text-primary" style="cursor:pointer" onclick="toggleForm()">
                    Don't have account? Signup
                </p>

            </div>

        </div>

    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        /* REDIRECT */

        function goToIndex() {
            window.location.href = "index.html"
        }

        /* MODAL */

        let modal = new bootstrap.Modal(document.getElementById('authModal'))

        function openModal() {
            modal.show()
        }

        /* AUTH SYSTEM */

        let isSignup = false

        function toggleForm() {

            isSignup = !isSignup

            document.getElementById("name").style.display = isSignup ? "block" : "none"

            document.getElementById("formTitle").innerText = isSignup ? "Signup" : "Login"

            document.querySelector(".modal-content button").innerText = isSignup ? "Signup" : "Login"

            document.querySelector(".modal-content p").innerText =
                isSignup ? "Already have account? Login" : "Don't have account? Signup"

        }

        /* LOGIN / SIGNUP */

        function submitAuth() {

            let name = document.getElementById("name").value.trim()
            let email = document.getElementById("email").value.trim()
            let password = document.getElementById("password").value.trim()

            if (!email || !password) {
                alert("Fill all fields")
                return
            }

            let users = JSON.parse(localStorage.getItem("users")) || []

            if (isSignup) {

                if (!name) {
                    alert("Enter name")
                    return
                }

                let exist = users.find(u => u.email === email)

                if (exist) {
                    alert("User already exists")
                    return
                }

                users.push({ name, email, password })
                localStorage.setItem("users", JSON.stringify(users))

                alert("Signup successful")
                toggleForm()

            } else {

                let user = users.find(u => u.email === email && u.password === password)

                if (user) {

                    localStorage.setItem("loggedIn", "true")
                    localStorage.setItem("currentUser", user.name)

                    modal.hide()
                    updateAuthButton()

                } else {
                    alert("Invalid credentials")
                }

            }

        }

        /* UPDATE BUTTON */

        function updateAuthButton() {

            let btn = document.getElementById("authBtn")

            if (localStorage.getItem("loggedIn")) {

                let name = localStorage.getItem("currentUser")

                btn.innerText = "Logout (" + name + ")"
                btn.onclick = logout

            } else {

                btn.innerText = "Login"
                btn.onclick = openModal

            }

        }

        /* LOGOUT */

        function logout() {
            localStorage.removeItem("loggedIn")
            localStorage.removeItem("currentUser")
            updateAuthButton()
        }

        updateAuthButton()

    </script>

</body>

</html>
