<!DOCTYPE html>
<html>

<head>

    <title>Your Cart</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f8;
            font-family: Arial;
        }

        .cart-item {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }

        .cart-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }

        .item-name {
            font-weight: 600;
        }

        .price {
            color: #198754;
            font-weight: bold;
        }

        .total-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg px-4" style="background:#2f4a8a;">

        <a class="navbar-brand text-white fw-bold fs-3" href="index.html">
            FoodRush
        </a>

    </nav>

    <div class="container mt-4">

        <h3 class="mb-4">Your Cart</h3>

        <div id="cart-items"></div>

        <div class="total-box mt-4">

            <h4>Total ₹<span id="total">0</span></h4>

            <a href="checkout.html">

                <button class="btn btn-success w-100 mt-3">
                    Proceed to Checkout
                </button>

            </a>

        </div>

    </div>

    <script>

        function displayCart() {

            let cart = JSON.parse(localStorage.getItem("cart")) || []

            const container = document.getElementById("cart-items")

            let total = 0

            container.innerHTML = ""

            cart.forEach(item => {

                let itemTotal = item.price * item.qty

                total += itemTotal

                container.innerHTML += `

<div class="cart-item">

<img src="${item.img}?auto=format&fit=crop&w=200&q=60">

<div style="flex:1">

<div class="item-name">${item.name}</div>

<div>Qty: ${item.qty}</div>

</div>

<div class="price">

₹${itemTotal}

</div>

</div>

`

            })

            document.getElementById("total").innerText = total

        }

        displayCart()

    </script>

</body>

</html>
```
