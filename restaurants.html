            justify-content: space-between;

        .logo {
            font-size: 22px;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);

        .card img {

            object-fit: cover;
